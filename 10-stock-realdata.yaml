    .analyst-pill .ap-cnt{font-size:14px;font-weight:700}
    .analyst-pill .ap-lab{font-size:9px;text-transform:uppercase;letter-spacing:.3px;opacity:.8}
    .ap-sb{background:#3fb95030;color:#3fb950}
    .ap-b{background:#58a6ff30;color:#58a6ff}
    .ap-h{background:#8b949e30;color:#8b949e}
    .ap-s{background:#f0883e30;color:#f0883e}
    .ap-ss{background:#f8514930;color:#f85149}
    .analyst-target{font-size:12px;color:#e6edf3;margin:4px 0}
    .analyst-bar{height:6px;border-radius:3px;background:#21262d;margin:6px 0;overflow:hidden;display:flex}
    .ab-buy{background:#3fb950;transition:width .3s}
    .ab-hold{background:#8b949e;transition:width .3s}
    .ab-sell{background:#f85149;transition:width .3s}
    .analyst-rec-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;margin-top:4px}
    .rec-strong-buy{background:#3fb95030;color:#3fb950;border:1px solid #3fb95066}
    .rec-buy{background:#58a6ff30;color:#58a6ff;border:1px solid #58a6ff66}
