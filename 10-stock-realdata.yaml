    .wl-cols{display:grid;grid-template-columns:62px 1fr 72px 58px 62px 62px 62px 62px 26px;font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:6px 4px;font-weight:600}
