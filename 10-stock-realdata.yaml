    .ti-val{font-size:12px;font-weight:700}
    /* ── 52W Range ── */
    .range-wrap{display:flex;align-items:center;gap:6px;margin:4px 0}
    .range-lo,.range-hi{font-size:10px;color:#8b949e;white-space:nowrap;min-width:44px}
    .range-hi{text-align:right}
    .range-track{flex:1;position:relative;height:6px;background:#21262d;border-radius:3px}
    .range-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#f85149,#e6edf3,#3fb950);border-radius:3px}
    .range-dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;background:#58a6ff;border:2px solid #161b22;transform:translateX(-50%);transition:left .3s}
    .range-pct{font-size:10px;color:#8b949e;margin-bottom:4px}
    /* ── Analyst ── */
    .analyst-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:6px 0}
