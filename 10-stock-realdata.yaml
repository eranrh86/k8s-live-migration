    .si-add-hint{font-size:10px;color:#8b949e66;flex-shrink:0;display:none}
    .search-item:hover .si-add-hint,.search-item.focused .si-add-hint{display:block}
    /* ── RSI Bar ── */
    .ti-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px;font-weight:600}
