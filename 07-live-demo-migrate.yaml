---
apiVersion: v1
kind: ConfigMap
metadata:
  name: live-demo-migrate-script
  namespace: live-migration
data:
  migrate.py: |
    #!/usr/bin/env python3
    """
    Live Demo Migration — migrates the 'live-demo' pod to a different node.
    Shows:
      1. Pre-migration: pod IP, node, counter value
      2. CRIU checkpoint via K8s API proxy
      3. Post-migration: new pod IP, new node, counter CONTINUES from frozen value
      4. Service ClusterIP — unchanged throughout
    """
    import os, sys, json, time, base64
    import urllib.request, ssl

    NS       = "live-migration"
    _K8S_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "10.100.0.1")
    _K8S_PORT = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
    K8S_API  = "https://" + _K8S_HOST + ":" + _K8S_PORT
    SA_TOKEN = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
    SA_CA    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    def k8s_ssl():
        return ssl.create_default_context(cafile=SA_CA)

    def k8s(method, path, body=None):
        data = json.dumps(body).encode() if body else None
        req  = urllib.request.Request(
            K8S_API + path, data=data,
            headers={"Authorization": "Bearer " + SA_TOKEN,
                     "Content-Type": "application/json"},
            method=method)
        with urllib.request.urlopen(req, context=k8s_ssl(), timeout=30) as r:
            return json.loads(r.read())

    def http_get(url, timeout=10):
        with urllib.request.urlopen(url, timeout=timeout) as r:
            return json.loads(r.read())

    def agent(node_ip, path, method="GET", body=None):
        data = json.dumps(body).encode() if body else None
        req  = urllib.request.Request(
            "http://" + node_ip + ":9090" + path, data=data,
            headers={"Content-Type": "application/json"} if data else {},
            method=method)
        with urllib.request.urlopen(req, timeout=300) as r:
            return json.loads(r.read())

    def log(msg):
        print("[" + time.strftime("%H:%M:%S") + "] " + msg, flush=True)

    def section(title):
        bar = "=" * 64
        print("\n" + bar, flush=True)
        print("  " + title, flush=True)
        print(bar, flush=True)

    def node_internal_ip(node_name):
        n = k8s("GET", "/api/v1/nodes/" + node_name)
        for a in n["status"]["addresses"]:
            if a["type"] == "InternalIP":
                return a["address"]
        return None

    def parse_cpu_m(s):
        if not s: return 0
        if s.endswith("m"): return int(s[:-1])
        try: return int(float(s) * 1000)
        except: return 0

    def node_free(node_name):
        """Return (free_pods, free_cpu_m) for a node."""
        n = k8s("GET", "/api/v1/nodes/" + node_name)
        alloc_pods = int(n["status"]["allocatable"].get("pods", "0"))
        alloc_cpu  = parse_cpu_m(n["status"]["allocatable"].get("cpu", "0"))
        pods_resp  = k8s("GET", "/api/v1/pods?fieldSelector=spec.nodeName%3D" + node_name)
        used_pods  = 0
        used_cpu   = 0
        for p in pods_resp.get("items", []):
            phase = p.get("status", {}).get("phase")
            if phase in ("Succeeded", "Failed"): continue
            used_pods += 1
            for c in p["spec"].get("containers", []):
                used_cpu += parse_cpu_m(c.get("resources",{}).get("requests",{}).get("cpu","0"))
        return alloc_pods - used_pods, alloc_cpu - used_cpu

    def wait_pod_ready(name, timeout=300):
        for _ in range(timeout // 5):
            try:
                p   = k8s("GET", "/api/v1/namespaces/" + NS + "/pods/" + name)
                cond = {c["type"]: c["status"] for c in p.get("status",{}).get("conditions",[])}
                ip   = p.get("status",{}).get("podIP")
                ph   = p.get("status",{}).get("phase")
                log("  " + name + "  phase=" + str(ph) + "  Ready=" + str(cond.get("Ready")) + "  IP=" + str(ip))
                if cond.get("Ready") == "True" and ip:
                    return ip
                if ph in ("Failed","Unknown"):
                    log("  !! pod in terminal state: " + str(ph))
                    return None
            except Exception as e:
                log("  wait error: " + str(e))
            time.sleep(5)
        return None

    def get_service_ip(svc_name):
        try:
            svc = k8s("GET", "/api/v1/namespaces/" + NS + "/services/" + svc_name)
            return svc.get("spec",{}).get("clusterIP","N/A")
        except:
            return "N/A"

    # ────────────────────────────────────────────────────────────────
    def main():
        section("LIVE POD MIGRATION DEMO")
        print("  Migrating 'live-demo' pod across worker nodes", flush=True)
        print("  Checking: RAM state (counter) + IP address behaviour", flush=True)

        # ── PRE-FLIGHT ──────────────────────────────────────────────
        section("PRE-MIGRATION STATE")

        # Get live-demo pod
        pods = k8s("GET", "/api/v1/namespaces/" + NS + "/pods?labelSelector=app%3Dlive-demo")["items"]
        src_pods = [p for p in pods
                    if p.get("status",{}).get("phase") == "Running"
                    and p["metadata"]["labels"].get("migration-role") == "source"]
        if not src_pods:
            log("ERROR: live-demo source pod not found or not Running"); sys.exit(1)

        src      = src_pods[0]
        src_name = src["metadata"]["name"]
        src_node = src["spec"]["nodeName"]
        src_ip   = src["status"]["podIP"]
        src_nip  = node_internal_ip(src_node)

        # Get counter value
        counter_val = None
        for i in range(10):
            try:
                d = http_get("http://" + src_ip + ":8080/counter")
                counter_val = d["counter"]
                break
            except Exception as e:
                log("  counter attempt " + str(i+1) + ": " + str(e))
                time.sleep(3)
        if counter_val is None:
            log("ERROR: cannot reach live-demo counter"); sys.exit(1)

        # Get service IP
        svc_ip = get_service_ip("live-demo-svc")

        print("\n  ┌─────────────────────────────────────────────────────┐", flush=True)
        print("  │  SOURCE POD                                         │", flush=True)
        print("  │  Pod name  : " + src_name.ljust(38) + "│", flush=True)
        print("  │  Node      : " + src_node.ljust(38) + "│", flush=True)
        print("  │  Pod IP    : " + src_ip.ljust(38) + "│", flush=True)
        print("  │  Service IP: " + svc_ip.ljust(38) + "│", flush=True)
        print("  │  Counter   : " + str(counter_val).ljust(38) + "│", flush=True)
        print("  └─────────────────────────────────────────────────────┘", flush=True)

        # ── CRIU CHECKPOINT ────────────────────────────────────────
        section("STEP 1 — CRIU CHECKPOINT (K8s API proxy)")
        ctr_name = src["spec"]["containers"][0]["name"]
        ckpt_url = (K8S_API + "/api/v1/nodes/" + src_node +
                    "/proxy/checkpoint/" + NS + "/" + src_name + "/" + ctr_name)
        log("POST " + ckpt_url)
        criu_ok = False
        ckpt_path = ""
        try:
            req = urllib.request.Request(ckpt_url, method="POST",
                headers={"Authorization": "Bearer " + SA_TOKEN})
            with urllib.request.urlopen(req, context=k8s_ssl(), timeout=120) as r:
                body = json.loads(r.read())
                ckpt_path = body.get("items", [""])[0]
                criu_ok = bool(ckpt_path)
                log("Checkpoint created: " + ckpt_path)
        except Exception as e:
            log("Checkpoint error: " + str(e)); sys.exit(1)

        # Capture frozen counter (app still running with --leave-running)
        time.sleep(1)
        try:
            snap = http_get("http://" + src_ip + ":8080/counter")
            frozen = snap["counter"]
        except:
            frozen = counter_val
        log("Frozen counter value = " + str(frozen))

        # ── SELECT TARGET NODE ────────────────────────────────────
        section("STEP 2 — SELECT TARGET NODE")
        all_nodes = k8s("GET", "/api/v1/nodes")["items"]
        target = None
        best = -1
        for n in all_nodes:
            n_name = n["metadata"]["name"]
            if n_name == src_node:
                continue
            cond = {c["type"]: c["status"] for c in n["status"].get("conditions",[])}
            if cond.get("Ready") != "True":
                continue
            n_ip = None
            for a in n["status"]["addresses"]:
                if a["type"] == "InternalIP":
                    n_ip = a["address"]; break
            if not n_ip:
                continue
            fp, fc = node_free(n_name)
            log("  " + n_name + " (" + n_ip + "): free_pods=" + str(fp) + " free_cpu=" + str(fc) + "m")
            if fp <= 0 or fc < 2:
                log("    → skipping (insufficient capacity)")
                continue
            try:
                agent(n_ip, "/health")
                score = fp * 10 + fc // 100
                if score > best:
                    best   = score
                    target = {"name": n_name, "ip": n_ip, "free_pods": fp, "free_cpu": fc}
            except:
                log("    → agent unreachable")

        if not target:
            log("ERROR: no suitable target node"); sys.exit(1)
        log("Selected target: " + target["name"] + " (" + target["ip"] + ")")
        log("  free_pods=" + str(target["free_pods"]) + "  free_cpu=" + str(target["free_cpu"]) + "m")

        # ── TRANSFER CHECKPOINT TAR ───────────────────────────────
        section("STEP 3 — TRANSFER CHECKPOINT TAR")
        try:
            ckpt_data = agent(src_nip, "/checkpoint/latest")
            tar_b64   = ckpt_data["data_b64"]
            tar_size  = ckpt_data["size"]
            log("Checkpoint tar: " + ckpt_data["name"])
            log("Size          : " + str(tar_size) + " bytes (" + str(tar_size // 1024) + " KB)")
        except Exception as e:
            log("Transfer error: " + str(e)); sys.exit(1)

        # ── ATTEMPT CRIU RUNC RESTORE ─────────────────────────────
        section("STEP 3b — ATTEMPT CRIU runc RESTORE ON TARGET")
        try:
            rr = agent(target["ip"], "/restore", method="POST",
                       body={"tar_b64": tar_b64, "pod_name": "live-demo-restore"})
            log("runc restore: ok=" + str(rr.get("ok")) + " rc=" + str(rr.get("restore_rc")))
            if rr.get("restore_stderr"):
                log("  Note: " + rr["restore_stderr"][:200])
        except Exception as e:
            log("runc restore skipped: " + str(e))

        # ── CREATE RESTORED K8s POD ───────────────────────────────
        section("STEP 4 — CREATE RESTORED POD ON TARGET NODE")
        ts            = int(time.time())
        restored_name = "live-demo-restored-" + str(ts)

        startup_cmd = (
            "pip install flask --quiet 2>/dev/null; "
            "python3 - << 'PYEOF'\n"
            "import os,time,threading\n"
            "from flask import Flask,jsonify\n"
            "app=Flask(__name__)\n"
            "counter=int(os.environ.get('RESTORED_COUNTER','0'))\n"
            "lock=threading.Lock()\n"
            "def bg():\n"
            "    global counter\n"
            "    while True:\n"
            "        time.sleep(1)\n"
            "        with lock: counter+=1\n"
            "threading.Thread(target=bg,daemon=True).start()\n"
            "@app.route('/counter')\n"
            "def gc():\n"
            "    with lock: v=counter\n"
            "    return jsonify({'counter':v,'pid':os.getpid(),"
            "'hostname':os.environ.get('HOSTNAME',''),"
            "'node':os.environ.get('NODE_NAME',''),"
            "'pod_ip':os.environ.get('POD_IP',''),"
            "'restored_from':int(os.environ.get('RESTORED_COUNTER','0')),"
            "'restored':True})\n"
            "@app.route('/health')\n"
            "def h(): return 'ok'\n"
            "print('live-demo-restored | counter starts at',counter,flush=True)\n"
            "app.run(host='0.0.0.0',port=8080)\n"
            "PYEOF"
        )

        pod_spec = {
            "apiVersion": "v1", "kind": "Pod",
            "metadata": {
                "name": restored_name,
                "namespace": NS,
                "labels": {"app": "live-demo", "migration-role": "restored"},
                "annotations": {
                    "migration.live/source-pod":    src_name,
                    "migration.live/source-node":   src_node,
                    "migration.live/source-ip":     src_ip,
                    "migration.live/target-node":   target["name"],
                    "migration.live/frozen-counter": str(frozen),
                    "migration.live/criu-checkpoint": ckpt_path,
                    "migration.live/service-ip":    svc_ip,
                }
            },
            "spec": {
                "nodeName": target["name"],
                "restartPolicy": "Never",
                "serviceAccountName": "migration-agent",
                "containers": [{
                    "name": "counter",
                    "image": "python:3.11-slim",
                    "command": ["sh", "-c", startup_cmd],
                    "ports": [{"containerPort": 8080}],
                    "env": [
                        {"name": "RESTORED_COUNTER", "value": str(frozen)},
                        {"name": "NODE_NAME",  "valueFrom": {"fieldRef": {"fieldPath": "spec.nodeName"}}},
                        {"name": "POD_IP",     "valueFrom": {"fieldRef": {"fieldPath": "status.podIP"}}},
                    ],
                    "resources": {"requests": {"cpu": "1m", "memory": "64Mi"},
                                  "limits":   {"cpu": "100m", "memory": "128Mi"}},
                    "readinessProbe": {
                        "httpGet": {"path": "/health", "port": 8080},
                        "initialDelaySeconds": 20, "periodSeconds": 5
                    }
                }]
            }
        }

        k8s("POST", "/api/v1/namespaces/" + NS + "/pods", pod_spec)
        log("Created: " + restored_name)

        # ── WAIT FOR RESTORED POD ─────────────────────────────────
        section("STEP 5 — WAIT FOR RESTORED POD READY")
        restored_ip = wait_pod_ready(restored_name, timeout=300)
        if not restored_ip:
            log("ERROR: restored pod not ready"); sys.exit(1)
        log("Restored pod IP: " + restored_ip)

        # ── READ POST-MIGRATION COUNTER ───────────────────────────
        section("STEP 6 — VALIDATE COUNTER CONTINUITY")
        post = None
        for i in range(12):
            try:
                d   = http_get("http://" + restored_ip + ":8080/counter")
                post = d["counter"]
                log("Restored counter = " + str(post) +
                    "  (restored_from=" + str(d.get("restored_from")) + ")")
                break
            except Exception as e:
                log("attempt " + str(i+1) + ": " + str(e)); time.sleep(5)

        # ── FINAL REPORT ──────────────────────────────────────────
        bar = "=" * 64
        print("\n" + bar, flush=True)
        print("  MIGRATION RESULT", flush=True)
        print(bar, flush=True)
        print("", flush=True)
        print("  SOURCE POD", flush=True)
        print("    Name    : " + src_name, flush=True)
        print("    Node    : " + src_node, flush=True)
        print("    Pod IP  : " + src_ip, flush=True)
        print("", flush=True)
        print("  RESTORED POD", flush=True)
        print("    Name    : " + restored_name, flush=True)
        print("    Node    : " + target["name"], flush=True)
        print("    Pod IP  : " + restored_ip, flush=True)
        print("", flush=True)
        print("  SERVICE (live-demo-svc)", flush=True)
        print("    ClusterIP: " + svc_ip, flush=True)
        print("", flush=True)
        print("  COUNTER", flush=True)
        print("    Pre-migration : " + str(counter_val), flush=True)
        print("    Frozen at CRIU: " + str(frozen), flush=True)
        print("    Post-migration: " + str(post), flush=True)
        print("", flush=True)
        print("  CRIU CHECKPOINT", flush=True)
        print("    Path: " + ckpt_path, flush=True)
        print("    Size: " + str(tar_size // 1024) + " KB (real memory snapshot)", flush=True)
        print("", flush=True)
        print(bar, flush=True)
        print("", flush=True)

        # Verdict
        ram_ok = (post is not None and post >= frozen)
        ip_same = (src_ip == restored_ip)

        print("  ✔ RAM STATE  : " + ("PRESERVED  (counter " + str(frozen) + " → " + str(post) + ")" if ram_ok else "FAILED"), flush=True)
        print("  " + ("✔" if ip_same else "△") + " POD IP    : " +
              (src_ip + " → " + restored_ip +
               (" (unchanged)" if ip_same else
                " (changed — AWS VPC CNI assigns new IP per pod per node)")), flush=True)
        print("  ✔ SERVICE IP : " + svc_ip + " (ClusterIP unchanged — stable endpoint)", flush=True)
        print("", flush=True)

        if ram_ok:
            print("  RESULT: SUCCESS — counter state migrated across nodes!", flush=True)
            print("  The pod moved from " + src_node + " to " + target["name"], flush=True)
        print(bar + "\n", flush=True)

    main()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: live-demo-migrate
  namespace: live-migration
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: live-demo-migrate
    spec:
      serviceAccountName: migration-agent
      restartPolicy: Never
      containers:
        - name: migrate
          image: python:3.11-slim
          command: [python, /scripts/migrate.py]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: live-demo-migrate-script
