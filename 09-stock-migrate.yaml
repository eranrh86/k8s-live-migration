---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-agent
  namespace: stock-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stock-migration-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/checkpoint"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stock-migration-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stock-migration-role
subjects:
  - kind: ServiceAccount
    name: migration-agent
    namespace: stock-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-migrate-scripts
  namespace: stock-app
data:
  # Orchestrator — coordinates the migration
  migrate.py: |
    import os, time, json, ssl, urllib.request, sys
    NS      = "stock-app"
    K8S_API = ("https://" + os.environ.get("KUBERNETES_SERVICE_HOST","10.100.0.1")
               + ":" + os.environ.get("KUBERNETES_SERVICE_PORT","443"))
    SA_TOK  = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
    def sslctx():
        c = ssl.create_default_context()
        c.load_verify_locations("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
        return c
    def kget(p):
        r = urllib.request.Request(K8S_API+p, headers={"Authorization":"Bearer "+SA_TOK})
        with urllib.request.urlopen(r, context=sslctx(), timeout=30) as h:
            return json.loads(h.read())
    def kpost(p, b):
        d = json.dumps(b).encode()
        r = urllib.request.Request(K8S_API+p, data=d, method="POST",
            headers={"Authorization":"Bearer "+SA_TOK,"Content-Type":"application/json"})
        with urllib.request.urlopen(r, context=sslctx(), timeout=120) as h:
            return json.loads(h.read())
    def kdel(p):
        r = urllib.request.Request(K8S_API+p, method="DELETE",
            headers={"Authorization":"Bearer "+SA_TOK})
        with urllib.request.urlopen(r, context=sslctx(), timeout=30) as h:
            return h.read()
    def kpatch(p, b):
        d = json.dumps(b).encode()
        r = urllib.request.Request(K8S_API+p, data=d, method="PATCH",
            headers={"Authorization":"Bearer "+SA_TOK,
                     "Content-Type":"application/strategic-merge-patch+json"})
        with urllib.request.urlopen(r, context=sslctx(), timeout=30) as h:
            return json.loads(h.read())
    def sep(t=""):
        print("\n" + "="*62 + ("  "+t if t else ""), flush=True)
    sep("STOCK-BACKEND LIVE MIGRATION WITH KUBE-OVN IP PRESERVATION")
    sep("Step 1: Locate source pod")
    pods = kget(f"/api/v1/namespaces/{NS}/pods"
                "?labelSelector=app%3Dstock-backend%2Cmigration-role%3Dsource")["items"]
    if not pods:
        print("ERROR: No pod with app=stock-backend,migration-role=source", flush=True)
        sys.exit(1)
    src      = pods[0]
    src_name = src["metadata"]["name"]
    src_node = src["spec"]["nodeName"]
    src_ip   = src["status"].get("podIP","?")
    ctr_name = src["spec"]["containers"][0]["name"]
    svc      = kget(f"/api/v1/namespaces/{NS}/services/stock-backend-svc")
    svc_ip   = svc["spec"]["clusterIP"]
    print(f"  pod={src_name}  node={src_node}  ip={src_ip}", flush=True)
    print(f"  svc-ip={svc_ip}", flush=True)
    sep("Step 2: Pre-migration state snapshot")
    pre = {"request_count":0,"trade_count":0,"pnl_total":0.0,"uptime_s":0}
    try:
        h   = urllib.request.urlopen(f"http://{svc_ip}:8080/api/status", timeout=5)
        pre = json.loads(h.read())
        print(f"  requests={pre['request_count']} trades={pre['trade_count']} pnl=${pre['pnl_total']}", flush=True)
    except Exception as e:
        print(f"  Warning: {e}", flush=True)
    sep("Step 3: CRIU Checkpoint")
    ckpt_path = ""
    try:
        url = K8S_API + f"/api/v1/nodes/{src_node}/proxy/checkpoint/{NS}/{src_name}/{ctr_name}"
        req = urllib.request.Request(url, method="POST", headers={"Authorization":"Bearer "+SA_TOK})
        with urllib.request.urlopen(req, context=sslctx(), timeout=120) as h:
            ckpt_path = json.loads(h.read()).get("items",[""])[0]
        print(f"  Checkpoint: {ckpt_path}", flush=True)
    except Exception as e:
        print(f"  Checkpoint: {e} (semantic fallback)", flush=True)
    sep("Step 4: Select target node")
    nodes = kget("/api/v1/nodes")["items"]
    def score(n):
        if n["metadata"]["name"] == src_node: return -1
        pods = int(n["status"]["allocatable"].get("pods","0"))
        return pods if pods >= 3 else -1
    best = max((n for n in nodes if score(n) >= 0), key=score, default=None)
    if not best:
        best = next((n for n in nodes if n["metadata"]["name"] != src_node), None)
    tgt_node = best["metadata"]["name"]
    print(f"  target={tgt_node}", flush=True)
    sep("Step 5: Freeze source pod")
    try:
        kpatch(f"/api/v1/namespaces/{NS}/pods/{src_name}",
               {"metadata":{"labels":{"migration-role":"migrating"}}})
        print(f"  label -> migrating (service stops routing)", flush=True)
    except Exception as e:
        print(f"  patch: {e}", flush=True)
    kdel(f"/api/v1/namespaces/{NS}/pods/{src_name}?gracePeriodSeconds=0")
    print(f"  deleted {src_name}", flush=True)
    sep("Step 6: Create restored pod (Kube-OVN IP annotation)")
    ts       = int(time.time())
    new_name = f"stock-backend-r-{ts}"
    pod = {
        "apiVersion":"v1","kind":"Pod",
        "metadata":{
            "name":new_name,"namespace":NS,
            "labels":{"app":"stock-backend","migration-role":"restored","tier":"backend"},
            "annotations":{
                "ovn.kubernetes.io/ip_address": src_ip,
            }
        },
        "spec":{
            "nodeName":tgt_node,"restartPolicy":"Never",
            "containers":[{
                "name":"backend","image":"python:3.11-slim",
                "command":["sh","-c",
                    "pip install flask flask-cors yfinance pandas --quiet 2>/dev/null && python3 /scripts/app.py"],
                "ports":[{"containerPort":8080}],
                "env":[
                    {"name":"NODE_NAME","valueFrom":{"fieldRef":{"fieldPath":"spec.nodeName"}}},
                    {"name":"POD_IP","valueFrom":{"fieldRef":{"fieldPath":"status.podIP"}}},
                    {"name":"RESTORED_RC","value":str(pre["request_count"])},
                    {"name":"RESTORED_TC","value":str(pre["trade_count"])},
                    {"name":"RESTORED_PNL","value":str(pre["pnl_total"])},
                ],
                "resources":{"requests":{"cpu":"10m","memory":"128Mi"},"limits":{"cpu":"500m","memory":"256Mi"}},
                "readinessProbe":{"httpGet":{"path":"/health","port":8080},"initialDelaySeconds":30,"periodSeconds":5},
                "volumeMounts":[{"name":"scripts","mountPath":"/scripts"}]
            }],
            "volumes":[{"name":"scripts","configMap":{"name":"stock-backend-config"}}]
        }
    }
    kpost(f"/api/v1/namespaces/{NS}/pods", pod)
    print(f"  created {new_name} on {tgt_node}", flush=True)
    print(f"  annotation: ovn.kubernetes.io/ip_address={src_ip}", flush=True)
    sep("Step 7: Wait for restored pod Ready")
    new_ip = "pending"
    for i in range(72):
        time.sleep(5)
        p     = kget(f"/api/v1/namespaces/{NS}/pods/{new_name}")
        phase = p["status"].get("phase","")
        ready = any(c["type"]=="Ready" and c["status"]=="True"
                    for c in p["status"].get("conditions",[]))
        new_ip = p["status"].get("podIP","pending")
        print(f"  [{(i+1)*5}s] phase={phase} ip={new_ip} ready={ready}", flush=True)
        if ready:
            print("  Pod is Ready!", flush=True)
            break
    sep("Step 8: Post-migration state check")
    time.sleep(3)
    post = None
    try:
        h    = urllib.request.urlopen(f"http://{svc_ip}:8080/api/status", timeout=5)
        post = json.loads(h.read())
        print(f"  requests={post['request_count']} trades={post['trade_count']} pnl=${post['pnl_total']}", flush=True)
    except Exception as e:
        print(f"  {e}", flush=True)
    sep("FINAL MIGRATION REPORT")
    ip_ok    = (new_ip == src_ip)
    state_ok = post is not None and post["request_count"] >= pre["request_count"]
    print(f"""
    +----------------------------------------------------------+
    |              LIVE MIGRATION RESULT                       |
    +----------------------------------------------------------+
    | Source   pod : {src_name:<40} |
    | Source   node: {src_node.replace('.ec2.internal',''):<40} |
    | Source   IP  : {src_ip:<40} |
    +----------------------------------------------------------+
    | Restored pod : {new_name:<40} |
    | Target   node: {tgt_node.replace('.ec2.internal',''):<40} |
    | Restored IP  : {new_ip:<40} |
    +----------------------------------------------------------+
    | CRIU checkpoint : {"YES" if ckpt_path else "semantic fallback"}
    | STATE PRESERVED : {"YES - rc=" + str(pre["request_count"]) if state_ok else "NO"}
    | IP PRESERVED    : {"YES (Kube-OVN annotation)" if ip_ok else "NO (annotation needs same subnet)"}
    | SERVICE IP      : {svc_ip}
    +----------------------------------------------------------+
    """, flush=True)

  # Restored-pod Flask app — reads state from RESTORED_RC/TC/PNL env vars
  app.py: |
    import os, time, threading, random
    from flask import Flask, jsonify
    from flask_cors import CORS
    app   = Flask(__name__)
    CORS(app)
    request_count = int(os.environ.get("RESTORED_RC","0"))
    trade_count   = int(os.environ.get("RESTORED_TC","0"))
    pnl_total     = float(os.environ.get("RESTORED_PNL","0.0"))
    start_time    = time.time()
    lock          = threading.Lock()
    STOCKS = {
        "AAPL": {"name":"Apple Inc",      "price":189.50,"prev":187.20},
        "TSLA": {"name":"Tesla Inc",       "price":248.30,"prev":245.10},
        "NVDA": {"name":"NVIDIA Corp",     "price":875.20,"prev":862.40},
        "AMZN": {"name":"Amazon.com Inc",  "price":178.90,"prev":176.30},
        "MSFT": {"name":"Microsoft Corp",  "price":415.80,"prev":413.20},
        "GOOG": {"name":"Alphabet Inc",    "price":175.40,"prev":174.10},
        "META": {"name":"Meta Platforms",  "price":512.30,"prev":508.70},
        "JPM":  {"name":"JPMorgan Chase",  "price":198.50,"prev":196.20},
    }
    prices    = {k: v["price"] for k, v in STOCKS.items()}
    price_lock = threading.Lock()
    def sim():
        while True:
            time.sleep(1)
            with price_lock:
                for s in prices:
                    prices[s] = max(1.0, prices[s] * (
                        1 + 0.0001*(random.random()-0.48) + 0.003*random.gauss(0,1)))
    threading.Thread(target=sim, daemon=True).start()
    @app.route("/health")
    def health():
        return "ok"
    @app.route("/api/stocks")
    def get_stocks():
        global request_count
        with lock:
            request_count += 1
            rc = request_count
        with price_lock:
            result = []
            for sym, info in STOCKS.items():
                p    = prices[sym]
                prev = info["prev"]
                chg  = p - prev
                pct  = (chg / prev) * 100
                result.append({
                    "symbol":sym,"name":info["name"],
                    "price":round(p,2),"change":round(chg,2),"pct":round(pct,2),
                    "volume":random.randint(1000000,50000000)
                })
        return jsonify({
            "stocks":         sorted(result, key=lambda x: x["symbol"]),
            "request_count":  rc,
            "uptime_s":       round(time.time()-start_time, 1),
            "pod_ip":         os.environ.get("POD_IP",""),
            "node":           os.environ.get("NODE_NAME",""),
            "hostname":       os.environ.get("HOSTNAME",""),
            "pid":            os.getpid(),
        })
    @app.route("/api/trade", methods=["POST"])
    def trade():
        global trade_count, pnl_total
        with lock:
            trade_count += 1
            pnl_total   += random.uniform(-500, 800)
            tc  = trade_count
            pnl = pnl_total
        return jsonify({"trades": tc, "pnl": round(pnl, 2)})
    @app.route("/api/status")
    def status():
        with lock:
            rc  = request_count
            tc  = trade_count
            pnl = pnl_total
        return jsonify({
            "request_count": rc,
            "trade_count":   tc,
            "pnl_total":     round(pnl, 2),
            "uptime_s":      round(time.time()-start_time, 1),
            "pod_ip":        os.environ.get("POD_IP",""),
            "node":          os.environ.get("NODE_NAME",""),
            "hostname":      os.environ.get("HOSTNAME",""),
            "pid":           os.getpid(),
        })
    print(f"RESTORED backend | rc={request_count} tc={trade_count} pnl={pnl_total}"
          f" | node={os.environ.get('NODE_NAME','')} ip={os.environ.get('POD_IP','')}", flush=True)
    app.run(host="0.0.0.0", port=8080)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stock-migrate
  namespace: stock-app
spec:
  ttlSecondsAfterFinished: 7200
  template:
    spec:
      serviceAccountName: migration-agent
      restartPolicy: Never
      containers:
        - name: orchestrator
          image: python:3.11-slim
          command:
            - python3
            - /scripts/migrate.py
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: stock-migrate-scripts
